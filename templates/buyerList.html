{% extends "base.html" %}

{% block head %}
    <title>Buyer List</title>
{% endblock %}

{% block body %}
    <h1>Buyer List</h1>
    <form actions="buyerList" method="POST">
        <label for="BidderNumber">Bidder Number:</label>
        <input type="text" name="BidderNumber" placeholder="Bidder Number"  required>
        <br>
        <label for="name">Name:</label>
        <input type="text" name="name" placeholder="Buyer Name" required>
        <br>
        <label for="Phone">Phone Number:</label>
        <input type="text" name="Phone" placeholder="Buyer Phone Number">
        <br>
        <label for="Address">Address:</label>
        <input type="text" name="Address" placeholder="Buyer Address" required>
        <br>
        <input type="submit" value="Add Buyer">
    </form>
    <table>
        <tr>
            <th>Bidder Number</th>
            <th>Name</th>
            <th>Address</th>
            <th>Actions</th>
        </tr>
        {% for buyer in buyers %}
        <tr>
            <td>{{ buyer.bidder_number }}</td>
            <td>{{ buyer.name }}</td>
            <td>{{ buyer.address }}</td>
            <td>
                <a href="/buyerList/edit/{{ buyer.id }}">Edit</a>
            </td>
        </tr>
        {% endfor %}
    </table>
{% endblock %}
