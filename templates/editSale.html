{% extends "base.html" %}

{% block head %}
    <title>Edit Sale</title>
{% endblock %}

{% block body %}
    <h1>Edit Sale</h1>
    <form actions="editSale/{{ sale.id }}" method="POST">
        <label for="animal_id">Animal:</label>
        <select name="animal_id" required>
            <option value="" disabled>Select an animal</option>
            {% for animal in animals %}
            <option value="{{ animal.id }}">Ear tag: {{animal.ear_tag_number}}</option>
            <option disabled>{{ animal.species }}</option>
            <option disabled>Exhibitor: {{animal.exhibitor.fName}} {{animal.exhibitor.lName}}</option>
            <hr>
            {% endfor %}
        </select>
        <br>
        <label for="buyer_id">Buyer:</label>
        <select name="buyer_id" required>
            <option value="" disabled>Select a buyer</option>
            {% for buyer in buyers %}
            <option value="{{ buyer.id }}" {% if buyer.id == sale.buyer_id %}selected{% endif %}>
                {{ buyer.fName }} {{ buyer.lName }}
            </option>
            {% endfor %}
        </select>
        <br>
        <label for="price">Sale Price:</label>
        <input type="number" step="0.01" name="price" placeholder="Sale Price" value="{{ sale.sale_price }}" required>
        <input type="submit" value="Update Sale">
    </form>
{% endblock %}
