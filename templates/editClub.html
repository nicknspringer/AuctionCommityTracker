{% extends "base.html" %}

{% block head %}
    <title>Edit Club</title>
{% endblock %}

{% block body %}
    <h1>Edit Club</h1>
    <form actions="editClub/{{ club.id }}" method="POST">
        <label for="name">Club Name:</label>
        <input type="text" name="name" placeholder="Club Name" value="{{ club.name }}" required>
        <br>
        <input type="submit" value="Update Club">
    </form>
{% endblock %}
